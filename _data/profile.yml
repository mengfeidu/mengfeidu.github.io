short_bio: >-
  Mengfei Du is currently a Ph.D. student in Individualized Interdisciplinary Program (AI) at HKUST,
  advised by <a href="https://scholar.google.com/citations?user=ootCmkEAAAAJ" target="_blank" rel="noopener">Sirui Han</a>
  and <a href="https://scholar.google.com/citations?user=-0q6cIYAAAAJ" target="_blank" rel="noopener">Yike Guo</a>.
  He previously received his B.Sc. and M.Phil. degrees from Fudan University,
  advised by <a href="https://scholar.google.com/citations?user=AjLDxxgAAAAJ" target="_blank" rel="noopener">Zhongyu Wei</a>.
  His research interests include Large Vision Language Models and Embodied AI.


